<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Box Grid Target</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="../rescan.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand-link" href="../index.html">Visual Sample</a>
      <div class="header-actions">
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="../index.html">Home</a>
          <a class="active" href="box-grid.html">Box Grid</a>
          <a href="dashboard.html">Dashboard</a>
        </nav>
        <button class="rescan-button" type="button" data-rescan-target>Rescan Target</button>
      </div>
    </header>

    <main class="sample-page" aria-label="Visual regression sample page" data-visual-target>
      <section class="test-box" aria-label="Outer test box">
        <div class="box-header">
          <h1>Box Grid Target</h1>
          <p>Updated colored boxes for screenshot comparison.</p>
          <p class="rescan-status" aria-live="polite" data-rescan-status>Ready for scan</p>
        </div>

        <div class="color-grid" aria-label="Colored inner boxes">
          <div class="color-box color-box-red">Red</div>
          <div class="color-box color-box-blue">Blue</div>
          <div class="color-box color-box-green">Green</div>
          <div class="color-box color-box-yellow">Yellow</div>
        </div>
      </section>
    </main>
  </body>
</html>
